version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam

  settings:
    revive:
      rules:
        - name: exported
          disabled: false
        - name: var-naming
        - name: package-comments
          disabled: true

  exclusions:
    rules:
      # tests often ignore Close/Write/Append errors for brevity
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - kansi

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
